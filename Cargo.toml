[workspace]
members = ["apps/*", "crates/*"]
resolver = "2"

[workspace.dependencies]
# Async Runtime
tokio = { version = "1.43", features = ["full"] }

# Discord & Voice
serenity = { version = "0.12", features = [
    "client",
    "gateway",
    "rustls_backend",
    "model",
] }
songbird = { version = "0.5.0", features = ["driver", "rustls", "serenity", "builtin-queue"] }

# Persistence
sqlx = { version = "0.8", features = [
    "runtime-tokio-rustls",
    "postgres",
    "uuid",
    "chrono",
    "macros",
] }

# Observability
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Utilities
anyhow = "1.0"
thiserror = "2.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
uuid = { version = "1.11", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
dotenvy = "0.15"
async-trait = "0.1"

[workspace.package]
version = "0.1.0"
edition = "2024"
authors = ["TeamTI"]

[patch.crates-io]
audiopus_sys = { git = "https://github.com/amsam0/audiopus_sys" }
