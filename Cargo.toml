[workspace.package]
version = "0.1.0"
edition = "2024"
authors = ["TeamTI"]

[workspace]
members = ["apps/*", "crates/*"]
resolver = "2"

[workspace.dependencies]
# Async Runtime
tokio = { version = "1.43", features = ["full"] }

# Discord & Voice
serenity = { git = "https://github.com/serenity-rs/serenity", branch = "next", features = [
    "gateway",
    "rustls_backend",
    "model",
    "cache",
    "voice",
] }
songbird = { git = "https://github.com/serenity-rs/songbird", branch = "serenity-next", features = [
    "driver",
    "rustls",
    "serenity",
    "builtin-queue",
] }
symphonia = { version = "0.5", features = ["mp3", "aac", "isomp4", "alac", "ogg", "vorbis", "wav", "flac"] }
rustls = { version = "0.23", default-features = false, features = ["ring", "std"] }

# Persistence
sqlx = { version = "0.8", features = [
    "runtime-tokio-rustls",
    "postgres",
    "uuid",
    "chrono",
    "macros",
] }

# Observability
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Utilities
anyhow = "1.0"
thiserror = "2.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
uuid = { version = "1.11", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
dotenvy = "0.15"
async-trait = "0.1"

[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1
strip = "symbols"
panic = "abort"
