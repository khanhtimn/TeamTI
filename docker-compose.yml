services:
  db:
    image: postgres:16-alpine
    container_name: teamti-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-teamti_music}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 3s
      retries: 5

  bot:
    image: khanhtimn/teamti-music-bot:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: teamti-music-bot
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-teamti_music}
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      DISCORD_GUILD_ID: ${DISCORD_GUILD_ID}
      MEDIA_ROOT: /app/media_data
      RUST_LOG: ${RUST_LOG:-info}
    volumes:
      - ${MEDIA_ROOT:-./media_data}:/app/media_data:ro

volumes:
  pgdata: