services:
  db:
    image: postgres:16-alpine
    container_name: teamti-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-teamti_music}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}" ]
      interval: 5s
      timeout: 3s
      retries: 5

  bot:
    image: khanhtimn/teamti_music_bot:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: teamti_music_bot
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-teamti_music}
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      DISCORD_GUILD_ID: ${DISCORD_GUILD_ID}
      MEDIA_ROOT: /app/media_data
      ACOUSTID_API_KEY: ${ACOUSTID_API_KEY}
      USER_AGENT: ${USER_AGENT:-TeamTI/0.1.0 (teamti@localhost)}
      MB_FETCH_WORK_CREDITS: ${MB_FETCH_WORK_CREDITS:-true}
      SCAN_INTERVAL_SECS: ${SCAN_INTERVAL_SECS:-300}
      SMB_READ_CONCURRENCY: ${SMB_READ_CONCURRENCY:-3}
      FINGERPRINT_CONCURRENCY: ${FINGERPRINT_CONCURRENCY:-4}
      COVER_ART_CONCURRENCY: ${COVER_ART_CONCURRENCY:-4}
      TAG_WRITE_CONCURRENCY: ${TAG_WRITE_CONCURRENCY:-2}
      ENRICHMENT_CONFIDENCE_THRESHOLD: ${ENRICHMENT_CONFIDENCE_THRESHOLD:-0.85}
      UNMATCHED_RETRY_LIMIT: ${UNMATCHED_RETRY_LIMIT:-3}
      FAILED_RETRY_LIMIT: ${FAILED_RETRY_LIMIT:-5}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-10}
      AUTO_LEAVE_SECS: ${AUTO_LEAVE_SECS:-30}
      RUST_LOG: ${RUST_LOG:-info,teamti=debug}
      LOG_FORMAT: ${LOG_FORMAT:-pretty}
    volumes:
      - ${MEDIA_ROOT:-./media_data}:/app/media_data:ro

volumes:
  pgdata:
